version: 0.2

phases:
  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin ${ACTUAL_ACCOUNT}.dkr.ecr.ap-south-1.amazonaws.com
      - echo "Installing kubectl..."
      - curl -LO https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl
      - chmod +x kubectl
      - mv kubectl /usr/local/bin/

  build:
    commands:
      - echo "Building the Docker image..."
      - docker build -t brain-tasks-app .
      - docker tag brain-tasks-app:latest ${ACTUAL_ACCOUNT}.dkr.ecr.ap-south-1.amazonaws.com/brain-tasks-app:latest

  post_build:
    commands:
      - echo "Pushing the Docker image to ECR..."
      - docker push ${ACTUAL_ACCOUNT}.dkr.ecr.ap-south-1.amazonaws.com/brain-tasks-app:latest
      - echo "Deploying to EKS..."
      - aws eks update-kubeconfig --region ap-south-1 --name brain-tasks-cluster
      - kubectl apply -f deployment.yaml
      - kubectl apply -f service.yaml
      - echo "Deployment completed successfully!"
      - kubectl get services
